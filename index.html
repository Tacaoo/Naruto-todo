<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninja Görev Listesi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Nunito:wght@400;600;700&display=swap');
  :root{--orange:#FF6B00;--dark-orange:#CC4400;--black:#0a0a0a;--card:#1a1a1a;--gold:#FFD700;--red:#CC0000;--white:#f5f0e8;--shadow:rgba(255,107,0,0.4);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--white);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;
    background-image:radial-gradient(ellipse at top,#1a0800 0%,transparent 60%),repeating-linear-gradient(45deg,transparent,transparent 60px,rgba(255,107,0,0.02) 60px,rgba(255,107,0,0.02) 61px);}
  header{text-align:center;padding:40px 20px 20px;}
  header h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1.4rem,5vw,2.8rem);color:var(--orange);text-shadow:0 0 20px var(--shadow),0 0 40px rgba(255,107,0,0.2);letter-spacing:2px;}
  header p{color:#888;margin-top:6px;font-size:0.9rem;}
  .headband{width:80px;height:6px;background:linear-gradient(90deg,var(--orange),var(--gold));margin:12px auto;border-radius:3px;box-shadow:0 0 12px var(--shadow);}
  .progress-section{max-width:600px;margin:0 auto 24px;padding:0 20px;}
  .progress-info{display:flex;justify-content:space-between;font-size:0.85rem;color:#aaa;margin-bottom:8px;}
  .progress-bar-bg{height:10px;background:#222;border-radius:5px;overflow:hidden;border:1px solid #333;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--gold));border-radius:5px;transition:width 0.6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px var(--shadow);width:0%;}
  .rank-badge{text-align:center;margin-bottom:20px;font-size:0.85rem;color:var(--gold);letter-spacing:1px;text-transform:uppercase;text-shadow:0 0 8px rgba(255,215,0,0.4);}
  .quote-panel{max-width:600px;margin:0 auto 20px;padding:0 20px;display:flex;align-items:center;gap:14px;min-height:70px;}
  .quote-char-wrap{flex-shrink:0;width:56px;height:56px;display:flex;align-items:center;justify-content:center;}
  .quote-char-wrap svg{width:56px;height:56px;}
  .quote-text{font-size:0.82rem;color:#888;font-style:italic;line-height:1.5;flex:1;}
  .quote-name{display:block;font-style:normal;font-weight:700;color:var(--orange);margin-top:3px;font-size:0.78rem;}
  .input-area{max-width:600px;margin:0 auto 28px;padding:0 20px;display:flex;gap:10px;}
  .input-area input{flex:1;background:var(--card);border:1px solid #333;border-radius:10px;padding:14px 18px;color:var(--white);font-family:'Nunito',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.3s,box-shadow 0.3s;}
  .input-area input:focus{border-color:var(--orange);box-shadow:0 0 12px rgba(255,107,0,0.2);}
  .input-area input::placeholder{color:#555;}
  .btn-add{background:linear-gradient(135deg,var(--orange),var(--dark-orange));border:none;border-radius:10px;padding:14px 22px;color:white;font-weight:700;font-size:1.2rem;cursor:pointer;transition:transform 0.15s,box-shadow 0.3s;box-shadow:0 4px 16px rgba(255,107,0,0.3);}
  .btn-add:hover{transform:scale(1.06);box-shadow:0 6px 22px rgba(255,107,0,0.5);}
  .btn-add:active{transform:scale(0.97);}
  .todo-list{max-width:600px;margin:0 auto;padding:0 20px 60px;display:flex;flex-direction:column;gap:14px;}
  .todo-item{background:var(--card);border:1px solid #2a2a2a;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.3s,box-shadow 0.3s,transform 0.2s;position:relative;overflow:hidden;animation:slideIn 0.4s cubic-bezier(.4,0,.2,1);}
  @keyframes slideIn{from{opacity:0;transform:translateX(-30px);}to{opacity:1;transform:translateX(0);}}
  .todo-item:hover{border-color:#444;transform:translateX(4px);}
  .todo-item.done{border-color:var(--orange)!important;box-shadow:0 0 18px rgba(255,107,0,0.15);background:#1e1200;}
  .todo-item.done .task-text{text-decoration:line-through;color:#666;}
  .todo-item.removing{animation:explodeOut 0.65s cubic-bezier(.4,0,.2,1) forwards;}
  @keyframes explodeOut{0%{opacity:1;transform:scale(1) rotate(0);}30%{opacity:1;transform:scale(1.07) rotate(-2deg);}100%{opacity:0;transform:scale(0.2) rotate(12deg);max-height:0;margin:0;padding:0;border:none;}}
  .checkbox{width:22px;height:22px;border-radius:50%;border:2px solid #444;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.8rem;transition:border-color 0.3s,background 0.3s;}
  .todo-item.done .checkbox{border-color:var(--orange);background:var(--orange);}
  .char-sprite{width:48px;height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;animation:float 3s ease-in-out infinite;}
  .char-sprite svg{width:48px;height:48px;}
  .todo-item:nth-child(2n) .char-sprite{animation-delay:0.4s;}
  .todo-item:nth-child(3n) .char-sprite{animation-delay:0.8s;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
  .todo-item.done .char-sprite{animation:celebrate 0.7s ease-in-out;filter:drop-shadow(0 0 10px rgba(255,215,0,0.8));}
  @keyframes celebrate{0%{transform:scale(1) rotate(0);}25%{transform:scale(1.5) rotate(-12deg);}50%{transform:scale(1.5) rotate(12deg);}75%{transform:scale(1.2) rotate(-5deg);}100%{transform:scale(1) rotate(0);}}
  .task-text{flex:1;font-size:0.95rem;font-weight:600;transition:color 0.3s;line-height:1.4;}
  .btn-del{background:none;border:none;color:#444;font-size:1rem;cursor:pointer;padding:4px 8px;border-radius:6px;transition:color 0.2s,background 0.2s;flex-shrink:0;}
  .btn-del:hover{color:var(--red);background:rgba(204,0,0,0.1);}
  .char-popup{position:fixed;pointer-events:none;z-index:999;animation:charFly 1.6s ease-out forwards;filter:drop-shadow(0 0 18px rgba(255,215,0,1));}
  .char-popup svg{width:80px;height:80px;}
  @keyframes charFly{0%{opacity:1;transform:scale(0.4) translateY(0) rotate(-12deg);}15%{opacity:1;transform:scale(1.4) translateY(-30px) rotate(8deg);}55%{opacity:1;transform:scale(1.2) translateY(-130px) rotate(-5deg);}100%{opacity:0;transform:scale(0.5) translateY(-260px) rotate(18deg);}}
  .empty-state{text-align:center;padding:40px 20px;color:#444;font-size:0.9rem;}
  .empty-state .big{font-size:3rem;margin-bottom:10px;}
</style>
</head>
<body>
<header>
  <h1>🥷 Ninja Görev Listesi</h1>
  <div class="headband"></div>
  <p>Görevlerini tamamla, ninja rütbeni yükselt!</p>
</header>
<div class="progress-section">
  <div class="progress-info"><span id="progressLabel">0 / 0 görev tamamlandı</span><span id="pct">%0</span></div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
</div>
<div class="rank-badge" id="rankBadge">🎖️ Akademi Öğrencisi</div>
<div class="quote-panel">
  <div class="quote-char-wrap" id="quoteCharWrap"></div>
  <div class="quote-text" id="quoteText">"Vazgeçmek benim stilim değil! Dattebayo!"<span class="quote-name">— Naruto Uzumaki</span></div>
</div>
<div class="input-area">
  <input type="text" id="taskInput" placeholder="Yeni görev ekle... (Dattebayo!)" maxlength="120">
  <button class="btn-add" onclick="addTask()">+</button>
</div>
<div class="todo-list" id="todoList">
  <div class="empty-state"><div class="big">🍃</div>Henüz görev yok. Ninja yolculuğuna başla!</div>
</div>

const CHARS=[
  {key:'naruto', name:'Naruto Uzumaki', kw:['naruto','uzumaki','dattebayo','konoha','ramen','rasengan','hokage'], q:'"Vazgeçmek benim stilim değil! Dattebayo!"'},
  {key:'sasuke', name:'Sasuke Uchiha',  kw:['sasuke','uchiha','sharingan','intikam','chidori'], q:'"Güç, yalnız başarılmaz."'},
  {key:'sakura', name:'Sakura Haruno',  kw:['sakura','haruno','pembe','şifa','ino'], q:'"İçimdeki güç hiç bitmeyecek."'},
  {key:'kakashi',name:'Kakashi Hatake', kw:['kakashi','hatake','kopya','jonin','kitap'], q:'"Hayatta hiçbir şey tesadüf değildir."'},
  {key:'itachi', name:'Itachi Uchiha',  kw:['itachi','akatsuki','mangekyou','kurban'], q:'"Affetme, her zaman yanlış ellerde olacak."'},
  {key:'rocklee',name:'Rock Lee',       kw:['rock','lee','gençlik','taijutsu','çalışkan'], q:'"Gençlik sadece yaşta değil, kalpte yaşar!"'},
  {key:'hinata', name:'Hinata Hyuga',   kw:['hinata','hyuga','byakugan','sevgi'], q:'"Seni korumak için buradayım."'},
  {key:'jiraiya',name:'Jiraiya',        kw:['jiraiya','kurbağa','efsane','sannin','sensei'], q:'"Harika bir insan olmak — bu en büyük ninjutsu."'},
  {key:'madara', name:'Madara Uchiha',  kw:['madara','rinnegan','edo','güçlü'], q:'"Hayaller gerçek olamaz mı?"'},
  {key:'kurama', name:'Kurama',         kw:['kurama','tilki','dokuz','kyuubi','demon'], q:'"Beni güçlü kılan seninle olan bağdır."'},
  {key:'minato', name:'Minato Namikaze',kw:['minato','namikaze','sarı','flash','baba'], q:'"Ailem ve köyüm için her şeyi veririm."'},
  {key:'gaara',  name:'Gaara',          kw:['gaara','kum','sand','rüzgar','kazekage'], q:'"Yalnız doğduk ama yolculuk tek başına olmak zorunda değil."'},
];
const ORDER=['naruto','sasuke','sakura','kakashi','itachi','rocklee','hinata','jiraiya','madara','kurama','minato','gaara'];
const RANKS=[{min:0,l:'🎖️ Akademi Öğrencisi'},{min:10,l:'🟢 Genin'},{min:30,l:'🔵 Chunin'},{min:60,l:'🟠 Jonin'},{min:90,l:'⭐ Kage'},{min:100,l:'🦊 Hokage'}];

let tasks=JSON.parse(localStorage.getItem('ntasks')||'[]'), rot=0;
const save=()=>localStorage.setItem('ntasks',JSON.stringify(tasks));
const byKey=k=>CHARS.find(c=>c.key===k)||CHARS[0];
const svgOf=(k,w,h)=>(SVG[k]||SVG.naruto)(w,h);

function detect(text){
  const low=text.toLowerCase();
  for(const c of CHARS) if(c.kw.some(k=>low.includes(k))) return c;
  return byKey(ORDER[rot++%ORDER.length]);
}

function addTask(){
  const inp=document.getElementById('taskInput');
  const text=inp.value.trim(); if(!text)return;
  const ch=detect(text);
  tasks.push({id:Date.now(),text,done:false,k:ch.key});
  save();inp.value='';render();inp.focus();
}
document.getElementById('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});

function toggle(id){
  const t=tasks.find(x=>x.id===id); if(!t||t.done)return;
  t.done=true;save();
  const el=document.querySelector(`[data-id="${id}"]`);
  if(el){
    el.classList.add('done');
    const ch=byKey(t.k);
    spawn(el,ch); setQuote(ch);
    setTimeout(()=>remove(id),1900);
  }
  updateUI();
}

function spawn(el,ch){
  const r=el.getBoundingClientRect();
  const p=document.createElement('div');
  p.className='char-popup';
  p.innerHTML=svgOf(ch.key,80,80);
  p.style.left=(r.left+r.width/2-40)+'px';
  p.style.top=(r.top+window.scrollY+4)+'px';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1700);
}

function setQuote(ch){
  document.getElementById('quoteCharWrap').innerHTML=svgOf(ch.key,56,56);
  document.getElementById('quoteText').innerHTML=ch.q+`<span class="quote-name">— ${ch.name}</span>`;
}

function remove(id){
  const el=document.querySelector(`[data-id="${id}"]`);
  if(el){el.classList.add('removing');setTimeout(()=>{tasks=tasks.filter(x=>x.id!==id);save();render();},650);}
}

function del(id,e){
  e.stopPropagation();tasks=tasks.filter(x=>x.id!==id);save();render();
}

function updateUI(){
  const total=tasks.length,done=tasks.filter(x=>x.done).length;
  const pct=total===0?0:Math.round(done/total*100);
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`${done} / ${total} görev tamamlandı`;
  document.getElementById('pct').textContent=`%${pct}`;
  const rank=[...RANKS].reverse().find(r=>pct>=r.min);
  document.getElementById('rankBadge').textContent=rank?rank.l:RANKS[0].l;
}

const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function render(){
  const list=document.getElementById('todoList');
  const pending=tasks.filter(x=>!x.done);
  if(!pending.length){list.innerHTML='<div class="empty-state"><div class="big">🍃</div>Henüz görev yok. Ninja yolculuğuna başla!</div>';updateUI();return;}
  list.innerHTML='';
  pending.forEach(t=>{
    const ch=byKey(t.k);
    const el=document.createElement('div');
    el.className='todo-item';el.dataset.id=t.id;
    el.innerHTML=`<div class="checkbox"></div><div class="char-sprite">${svgOf(ch.key,48,48)}</div><div class="task-text">${esc(t.text)}</div><button class="btn-del" title="Sil">✕</button>`;
    el.addEventListener('click',()=>toggle(t.id));
    el.querySelector('.btn-del').addEventListener('click',e=>del(t.id,e));
    list.appendChild(el);
  });
  updateUI();
}

setQuote(CHARS[0]);render();
</script>
</body>
</html>
